name: AI Development Automation

# Two ways to run:
#  • workflow_call  — the normal path. Each client repo has a tiny caller
#    workflow (see templates/client-caller.yml) that `uses:` this one, passing
#    the dispatch payload as inputs and `secrets: inherit`. All the logic lives
#    here in the central repo; clients never copy the scripts.
#  • repository_dispatch — kept for single-repo testing of THIS repo directly.
on:
  workflow_call:
    inputs:
      shopify_store:    { required: false, type: string }
      github_repo:      { required: false, type: string }
      base_branch:      { required: false, type: string }
      task_id:          { required: false, type: string }
      task_name:        { required: false, type: string }
      task_description: { required: false, type: string }
    secrets:
      ANTHROPIC_API_KEY: { required: true }
      SHOPIFY_TOKEN:     { required: true }
      CLICKUP_API_KEY:   { required: true }
      FIGMA_TOKEN:       { required: false }
      GH_DISPATCH_PAT:   { required: false }  # checks out the client theme repo
  repository_dispatch:
    types: [ai-development-automation]

permissions:
  contents: write   # create branches + push files via GITHUB_TOKEN (dispatch path)

jobs:
  ai-development-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Resolve every value from inputs (workflow_call) OR the dispatch payload,
    # so both entry points share one job body.
    env:
      IN_SHOPIFY_STORE: ${{ inputs.shopify_store || github.event.client_payload.shopify_store }}
      IN_GITHUB_REPO:   ${{ inputs.github_repo   || github.event.client_payload.github_repo   || github.repository }}
      IN_BASE_BRANCH:   ${{ inputs.base_branch   || github.event.client_payload.base_branch }}
      IN_TASK_ID:       ${{ inputs.task_id        || github.event.client_payload.task_id }}
      IN_TASK_NAME:     ${{ inputs.task_name      || github.event.client_payload.task_name }}
      IN_TASK_DESC:     ${{ inputs.task_description || github.event.client_payload.task_description }}
      # PAT (from secrets: inherit) checks out the client theme repo cross-repo.
      # On the dispatch self-test path it may be empty — checkout then falls back
      # to GITHUB_TOKEN, which can read the repo the workflow already runs in.
      CHECKOUT_TOKEN: ${{ secrets.GH_DISPATCH_PAT || secrets.GITHUB_TOKEN }}

    steps:
      # The client theme must be the working tree the agent edits and github.js
      # diffs (it reads GITHUB_WORKSPACE). Resolve the base branch first so we
      # check out the right ref — clients use main/master/custom.
      - name: Resolve client repo default branch
        id: branch
        env:
          GH_TOKEN: ${{ env.CHECKOUT_TOKEN }}
        run: |
          if [ -n "$IN_BASE_BRANCH" ]; then
            BRANCH="$IN_BASE_BRANCH"            # explicit override wins
          else
            BRANCH=$(gh api "repos/$IN_GITHUB_REPO" --jq '.default_branch')
          fi
          echo "Base branch: $BRANCH"
          echo "base_branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout client theme
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IN_GITHUB_REPO }}
          ref: ${{ steps.branch.outputs.base_branch }}
          token: ${{ env.CHECKOUT_TOKEN }}
          # Land at the workspace root — github.js reads GITHUB_WORKSPACE as the
          # theme root and the agent edits files here.
          path: .

      - name: Checkout central automation scripts
        uses: actions/checkout@v4
        with:
          repository: bluestout/ai-development-automation
          ref: main
          path: _automation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: _automation
        run: |
          npm init -y
          npm install @anthropic-ai/claude-agent-sdk node-fetch@2

      - name: Run AI automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Per-client store from the resolved input; falls back to a secret for
          # single-store self-testing.
          SHOPIFY_STORE: ${{ env.IN_SHOPIFY_STORE || secrets.SHOPIFY_STORE }}
          # Each store/app has its own Admin API token, so SHOPIFY_TOKEN is a
          # per-repo secret (passed through via secrets: inherit).
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          # Optional Figma file-read PAT — enables the design fetch when a task
          # references a figma.com URL.
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          # Pushing branches/files goes to the client repo, so reuse the same
          # cross-repo token the checkout used.
          GITHUB_TOKEN: ${{ env.CHECKOUT_TOKEN }}
          REPO_NAME: ${{ env.IN_GITHUB_REPO }}
          BASE_BRANCH: ${{ steps.branch.outputs.base_branch }}
          TASK_ID: ${{ env.IN_TASK_ID }}
          TASK_NAME: ${{ env.IN_TASK_NAME }}
          TASK_DESCRIPTION: ${{ env.IN_TASK_DESC }}
        # GITHUB_WORKSPACE is the client theme root; scripts live under _automation.
        run: node _automation/.github/scripts/ai-development-automation.js
