name: AI Development Automation

on:
  repository_dispatch:
    types: [ai-development-automation]

permissions:
  contents: write   # create branches + push files via GITHUB_TOKEN

jobs:
  ai-development-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install @anthropic-ai/claude-agent-sdk node-fetch@2

      - name: Run AI automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Per-client store comes from the ClickUp custom field via the dispatch
          # payload; falls back to the SHOPIFY_STORE secret for single-store testing.
          SHOPIFY_STORE: ${{ github.event.client_payload.shopify_store || secrets.SHOPIFY_STORE }}
          # One custom-app token works across all client stores in the same Partner org.
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          # Figma personal access token (file-read scope). When a task references
          # a figma.com URL, the design is fetched and injected into the Dev AI
          # prompt. Optional — without it, Figma-referencing tasks just skip the
          # design fetch.
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_ID: ${{ github.event.client_payload.task_id }}
          TASK_NAME: ${{ github.event.client_payload.task_name }}
          TASK_DESCRIPTION: ${{ github.event.client_payload.task_description }}
          # Target repo from the ClickUp field if provided, else the repo this
          # workflow runs in (github.repository).
          REPO_NAME: ${{ github.event.client_payload.github_repo || github.repository }}
        run: node .github/scripts/ai-development-automation.js
